title: Ciber Cazadora
name: Priscilla
description: "Security leader. Cloud, risk, and compliance."
url: "https://cibercazadora.github.io"
baseurl: ""

# Build
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:title

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
