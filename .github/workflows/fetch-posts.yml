Synthesized practical methods for Substack RSS integration
Synthesized practical methods for Substack RSS integration
There are a few solid ways to do this, depending on how much control you want.

Option 1: Fetch the RSS Feed with JavaScript (Easiest)
Substack gives every publication an RSS feed at https://yourname.substack.com/feed. You can pull that into your GitHub Pages site client-side.

The catch: Browsers block cross-origin requests, so you need a proxy. Use rss2json.com — it's free and converts your RSS to JSON you can fetch easily.

javascript
const RSS_URL = "https://yourname.substack.com/feed";
const API = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

fetch(API)
  .then(res => res.json())
  .then(data => {
    data.items.forEach(post => {
      console.log(post.title, post.link, post.pubDate);
    });
  });
Then render those into whatever HTML structure you want. Fast to set up, zero backend needed.

Option 2: Build It at Deploy Time with GitHub Actions (More Robust)
A GitHub Action can fetch your RSS feed and generate static HTML every few hours. No third-party proxy dependency.

Create .github/workflows/fetch-posts.yml
Use a Python or Node script to pull the feed and write to an HTML/JSON file
Commit the output and let GitHub Pages serve it
This is better long-term. It works even if JavaScript is disabled, and your posts live in your repo.

Option 3: Use Jekyll with an RSS Plugin (If You're Already on Jekyll)
If your github.io uses Jekyll, add the jekyll-feed or use a plugin like jekyll-rss-feeds. You'd still need to fetch Substack's feed externally, but you can do it with a Liquid template + a data file generated by a GitHub Action.

Which Should You Pick?
Approach	Effort	Reliability	Works without JS
rss2json + JS	Low	Medium	No
GitHub Actions	Medium	High	Yes
Jekyll plugin	Medium	High	Yes
My honest take: Start with the rss2json method to prove it works, then migrate to a GitHub Action once you're happy with the layout. The third-party API is fine for personal sites; just don't build a business on it.

