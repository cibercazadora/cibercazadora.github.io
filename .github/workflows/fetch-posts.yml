name: Fetch Substack Posts

on:
  schedule:
    - cron: "0 */6 * * *" # Run every 6 hours
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write #required to push changes
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          feed_url: 'https://example.com/rss'
          file_path: './data/feed.json'
          
      - name: Fetch and parse feed
        run: |
          curl -s https://securitytranslated.substack.com/feed | \
            xml2json | \
            jq -r '.rss.channel.item[] | {title: .title, link: .link, pubDate: .pubDate} | @json' > posts.json  

      - name: Commit posts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --cached --quiet || git commit -m "chore: refresh Substack posts"
          git push
