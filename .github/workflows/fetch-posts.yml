Weighed alternative solutions bypassing Substack's IP blocking restrictions
Substack is blocking all GitHub Actions IP ranges, full stop. Let's abandon that approach and do two things:

1. Generate posts.json right now from your machine (Substack won't block your personal IP). Open Anaconda Prompt, cd into your repo folder, and run:

bash
python -c "
import requests, json, re
from datetime import datetime
headers = {'User-Agent': 'Mozilla/5.0'}
res = requests.get('https://securitytranslated.substack.com/api/v1/posts?limit=8', headers=headers)
posts = []
for post in res.json():
    date = post.get('post_date','')[:10]
    try: date = datetime.strptime(date,'%Y-%m-%d').strftime('%B %d, %Y')
    except: pass
    posts.append({'title':post.get('title',''), 'url':'https://securitytranslated.substack.com/p/'+post.get('slug',''), 'date':date, 'excerpt':post.get('subtitle','')})
json.dump(posts, open('posts.json','w'), indent=2)
print('done', len(posts), 'posts')
"
Then commit it:

bash
git add posts.json
git commit -m "add posts.json"
git push
