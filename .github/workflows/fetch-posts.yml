name: Fetch Substack Posts
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install requests
        run: pip install requests --quiet

      - name: Fetch feed and generate posts.json
        run: |
          python3 << 'PYEOF'
          import requests
          import xml.etree.ElementTree as ET
          import json
          import re
          from datetime import datetime

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept": "application/rss+xml, application/xml, text/xml, */*",
              "Accept-Language": "en-US,en;q=0.9",
              "Referer": "https://securitytranslated.substack.com/",
          }

          url = "https://securitytranslated.substack.com/feed"
          res = requests.get(url, headers=headers, timeout=15)
          res.raise_for_status()

          root = ET.fromstring(res.content)

          posts = []
          for item in root.findall(".//item")[:8]:
              title = item.findtext("title", "").strip()
              link  = item.findtext("link", "").strip()
              date  = item.findtext("pubDate", "").strip()
              desc  = item.findtext("description", "").strip()
              desc  = re.sub(r"<[^>]+>", "", desc).strip()[:200]
              try:
                  date = datetime.strptime(date, "%a, %d %b %Y %H:%M:%S %z").strftime("%B %-d, %Y")
              except Exception:
                  pass
              posts.append({"title": title, "url": link, "date": date, "excerpt": desc})

          with open("posts.json", "w") as f:
              json.dump(posts, f, indent=2)

          print(f"Wrote {len(posts)} posts to posts.json")
          PYEOF

      - name: Commit posts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --cached --quiet || git commit -m "chore: refresh Substack posts"
          git push
