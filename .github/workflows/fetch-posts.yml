name: Fetch Substack Posts
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
 
      - name: Install requests
        run: pip install requests --quiet
 
      - name: Run update script
        run: python update-posts.py
 
      - name: Commit posts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --cached --quiet || git commit -m "chore: refresh Substack posts"
          git push
 
