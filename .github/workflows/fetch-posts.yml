Diagnosed workflow file parsing issue, considered syntax validation
Got it. When you said "it's green" earlier you meant the file exists in the repo, not that the workflow ran. GitHub isn't recognizing the yml file as a valid workflow, which usually means a YAML indentation problem from copy-pasting.

Let's replace it with a clean version. Go to that file in your repo and edit it, then paste this in, replacing everything:

yaml
name: Fetch Substack Posts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and parse feed
        run: |
          curl -s "https://securitytranslated.substack.com/feed" -H "User-Agent: Mozilla/5.0" -o feed.xml
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import json, re
          from datetime import datetime
          tree = ET.parse("feed.xml")
          root = tree.getroot()
          posts = []
          for item in root.findall(".//item")[:8]:
              title = item.findtext("title", "").strip()
              link  = item.findtext("link", "").strip()
              date  = item.findtext("pubDate", "").strip()
              desc  = item.findtext("description", "").strip()
              clean = re.sub(r"<[^>]+>", "", desc).strip()[:200]
              try:
                  dt = datetime.strptime(date, "%a, %d %b %Y %H:%M:%S %z")
                  formatted = dt.strftime("%B %-d, %Y")
              except:
                  formatted = date
              posts.append({"title": title, "url": link, "date": formatted, "excerpt": clean})
          json.dump(posts, open("posts.json","w"), indent=2)
          print(f"Wrote {len(posts)} posts")
          EOF

      - name: Commit posts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --cached --quiet || git commit -m "chore: refresh Substack posts"
          git push
After saving, go to Actions and you should now see Fetch Substack Posts listed as a workflow. Hit Run workflow to trigger it manually. Then also make sure to do the permissions fix from my last message (Settings → Actions → General → Read and write permissions) before you run it, otherwise it still won't be able to commit the file.

