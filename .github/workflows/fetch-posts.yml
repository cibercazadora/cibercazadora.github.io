name: Fetch Substack Posts
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install requests
        run: pip install requests --quiet

      - name: Fetch posts and generate posts.json
        run: |
          python3 << 'PYEOF'
          import requests
          import json
          import re
          from datetime import datetime

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept": "application/json",
          }

          url = "https://securitytranslated.substack.com/api/v1/posts?limit=8"
          res = requests.get(url, headers=headers, timeout=15)

          print(f"Status: {res.status_code}")

          res.raise_for_status()

          data = res.json()

          posts = []
          for post in data[:8]:
              title   = post.get("title", "").strip()
              slug    = post.get("slug", "")
              url     = f"https://securitytranslated.substack.com/p/{slug}"
              excerpt = post.get("subtitle", "") or re.sub(r"<[^>]+>", "", post.get("body_html", "")).strip()[:200]
              date    = post.get("post_date", "")
              try:
                  date = datetime.strptime(date[:10], "%Y-%m-%d").strftime("%B %-d, %Y")
              except Exception:
                  pass
              posts.append({"title": title, "url": url, "date": date, "excerpt": excerpt})

          with open("posts.json", "w") as f:
              json.dump(posts, f, indent=2)

          print(f"Wrote {len(posts)} posts to posts.json")
          PYEOF

      - name: Commit posts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --cached --quiet || git commit -m "chore: refresh Substack posts"
          git push
