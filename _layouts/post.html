---
layout: default
---
<article>
  <header class="post-header">
    <div class="container">
      <a href="{{ '/#blog' | relative_url }}" style="font-size: 0.85rem; color: var(--text-muted); display: inline-block; margin-bottom: 1rem;">&larr; Back to blog</a>
      <h1>{{ page.title }}</h1>
      <div class="post-meta">{{ page.date | date: "%B %d, %Y" }}</div>
    </div>
  </header>
  <div class="container">
    <div class="post-content">
      {{ content }}
    </div>
  </div>
</article>
