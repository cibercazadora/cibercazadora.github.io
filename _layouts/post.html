---
layout: default
---

<div class="container">
  <h1>{{ page.title }}</h1>
  <p class="meta">{{ page.date | date: "%B %d, %Y" }}</p>

  {{ content }}

  <hr>

  <div class="post-nav">
    {% if page.previous %}
      <a href="{{ page.previous.url }}">← {{ page.previous.title }}</a>
    {% endif %}

    {% if page.next %}
      <a href="{{ page.next.url }}">{{ page.next.title }} →</a>
    {% endif %}
  </div>
</div>
